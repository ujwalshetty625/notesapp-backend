<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notes</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --border: #e8e8e8;
      --border-focus: #1a1a1a;
      --text: #1a1a1a;
      --text-muted: #888;
      --accent: #1a1a1a;
      --accent-hover: #333;
      --danger: #e53e3e;
      --danger-hover: #c53030;
      --radius: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    /* AUTH */
    #auth-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: var(--shadow);
    }

    .auth-card h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }

    .auth-card p.subtitle {
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 28px;
    }

    .tab-row {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      background: none;
      border: none;
      padding: 8px 0;
      margin-right: 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab.active {
      color: var(--text);
      border-bottom-color: var(--text);
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .field input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      background: var(--bg);
      transition: border-color 0.15s;
    }

    .field input:focus {
      border-color: var(--border-focus);
      background: var(--surface);
    }

    .btn {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 6px;
    }

    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      margin-top: 12px;
      font-size: 12px;
      color: var(--danger);
      text-align: center;
    }

    /* APP */
    #app-screen { display: none; min-height: 100vh; }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar h2 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    .note-count {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 9px;
    }

    .logout-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 14px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .logout-btn:hover {
      border-color: var(--text);
      color: var(--text);
    }

    .main {
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    /* NEW NOTE */
    .new-note-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 32px;
      box-shadow: var(--shadow);
    }

    .new-note-box input,
    .new-note-box textarea {
      width: 100%;
      border: none;
      outline: none;
      font-family: inherit;
      background: transparent;
      color: var(--text);
      resize: none;
    }

    .new-note-box input {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.2px;
    }

    .new-note-box input::placeholder { color: #ccc; }

    .new-note-box textarea {
      font-size: 14px;
      line-height: 1.6;
      min-height: 80px;
      color: var(--text-muted);
    }

    .new-note-box textarea::placeholder { color: #ccc; }

    .new-note-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .add-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }

    .add-btn:hover { background: var(--accent-hover); }
    .add-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* NOTES LIST */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    .notes-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    @media (max-width: 560px) {
      .notes-grid { grid-template-columns: 1fr; }
      .topbar { padding: 0 16px; }
      .main { padding: 24px 16px; }
    }

    .note-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: relative;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .note-card:hover {
      border-color: #d0d0d0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .note-card.editing {
      border-color: var(--border-focus);
    }

    .note-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.1px;
      border: none;
      outline: none;
      font-family: inherit;
      background: transparent;
      width: 100%;
      pointer-events: none;
    }

    .note-content {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      border: none;
      outline: none;
      font-family: inherit;
      background: transparent;
      width: 100%;
      resize: none;
      min-height: 60px;
      pointer-events: none;
    }

    .note-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 8px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .note-card:hover .note-actions { opacity: 1; }

    .action-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.15s;
    }

    .action-btn:hover {
      border-color: var(--text);
      color: var(--text);
    }

    .action-btn.save {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .action-btn.save:hover { background: var(--accent-hover); }

    .action-btn.delete:hover {
      border-color: var(--danger);
      color: var(--danger);
    }

    .empty-state {
      text-align: center;
      padding: 60px 0;
      color: var(--text-muted);
    }

    .empty-state p:first-child {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
    }

    .empty-state p:last-child { font-size: 13px; }

    .loading {
      text-align: center;
      padding: 60px 0;
      color: var(--text-muted);
      font-size: 13px;
    }
  </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <h1>Notes</h1>
    <p class="subtitle">Your thoughts, kept simple.</p>

    <div class="tab-row">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('signup')">Sign up</button>
    </div>

    <div id="login-form">
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" />
      </div>
      <button class="btn" onclick="login()">Login</button>
    </div>

    <div id="signup-form" style="display:none">
      <div class="field">
        <label>Name</label>
        <input type="text" id="signup-name" placeholder="Your name" />
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="••••••••" />
      </div>
      <button class="btn" onclick="signup()">Create account</button>
    </div>

    <div class="error-msg" id="auth-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-left">
      <h2>Notes</h2>
      <span class="note-count" id="note-count">0</span>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="main">
    <div class="new-note-box">
      <input type="text" id="new-title" placeholder="Title" maxlength="100" />
      <textarea id="new-content" placeholder="Write something..." rows="3"></textarea>
      <div class="new-note-footer">
        <button class="add-btn" id="add-btn" onclick="createNote()">Add note</button>
      </div>
    </div>

    <div class="section-label" id="notes-label" style="display:none">Your notes</div>
    <div id="notes-container"><div class="loading">Loading...</div></div>
  </div>
</div>

<script>
  const API = 'https://notesapp-backend-8pzp.onrender.com';
  let token = null;

  // --- AUTH ---
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
    document.getElementById('auth-error').textContent = '';
  }

  async function login() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if (!email || !password) return showAuthError('Fill in all fields.');

    const form = new FormData();
    form.append('username', email);
    form.append('password', password);
    form.append('grant_type', 'password');

    try {
      const res = await fetch(`${API}/login`, { method: 'POST', body: form });
      const data = await res.json();
      if (!res.ok) return showAuthError(data.detail || 'Login failed.');
      token = data.access_token;
      showApp();
    } catch { showAuthError('Could not reach server.'); }
  }

  async function signup() {
    const name = document.getElementById('signup-name').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    if (!name || !email || !password) return showAuthError('Fill in all fields.');

    try {
      const res = await fetch(`${API}/signup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });
      const data = await res.json();
      if (!res.ok) return showAuthError(data.detail || 'Signup failed.');
      showAuthError('Account created — login now.');
      switchTabByName('login');
    } catch { showAuthError('Could not reach server.'); }
  }

  function switchTabByName(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'signup' && i === 1));
    });
    document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
  }

  function showAuthError(msg) {
    document.getElementById('auth-error').textContent = msg;
  }

  function logout() {
    token = null;
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('login-email').value = '';
    document.getElementById('login-password').value = '';
  }

  function showApp() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    loadNotes();
  }

  // --- NOTES ---
  async function loadNotes() {
    document.getElementById('notes-container').innerHTML = '<div class="loading">Loading...</div>';
    try {
      const res = await fetch(`${API}/notes`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const notes = await res.json();
      renderNotes(notes);
    } catch {
      document.getElementById('notes-container').innerHTML = '<div class="loading">Failed to load notes.</div>';
    }
  }

  function renderNotes(notes) {
    const label = document.getElementById('notes-label');
    const container = document.getElementById('notes-container');
    document.getElementById('note-count').textContent = notes.length;

    if (notes.length === 0) {
      label.style.display = 'none';
      container.innerHTML = `
        <div class="empty-state">
          <p>No notes yet</p>
          <p>Add one above to get started.</p>
        </div>`;
      return;
    }

    label.style.display = 'block';
    container.innerHTML = `<div class="notes-grid">${notes.map(noteCard).join('')}</div>`;
  }

  function noteCard(note) {
    return `
      <div class="note-card" id="card-${note.id}">
        <input class="note-title" id="title-${note.id}" value="${escHtml(note.title)}" readonly />
        <textarea class="note-content" id="content-${note.id}" readonly>${escHtml(note.content)}</textarea>
        <div class="note-actions">
          <button class="action-btn" id="edit-btn-${note.id}" onclick="editNote(${note.id})">Edit</button>
          <button class="action-btn delete" onclick="deleteNote(${note.id})">Delete</button>
        </div>
      </div>`;
  }

  function editNote(id) {
    const card = document.getElementById(`card-${id}`);
    const titleEl = document.getElementById(`title-${id}`);
    const contentEl = document.getElementById(`content-${id}`);
    const editBtn = document.getElementById(`edit-btn-${id}`);

    const isEditing = !titleEl.readOnly;
    if (isEditing) {
      saveNote(id);
      return;
    }

    titleEl.removeAttribute('readonly');
    contentEl.removeAttribute('readonly');
    titleEl.style.pointerEvents = 'auto';
    contentEl.style.pointerEvents = 'auto';
    card.classList.add('editing');
    editBtn.textContent = 'Save';
    editBtn.classList.add('save');
    titleEl.focus();
  }

  async function saveNote(id) {
    const title = document.getElementById(`title-${id}`).value.trim();
    const content = document.getElementById(`content-${id}`).value.trim();
    if (!title || !content) return;

    try {
      const res = await fetch(`${API}/notes/${id}`, {
        method: 'PUT',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, content })
      });
      if (!res.ok) return;

      const titleEl = document.getElementById(`title-${id}`);
      const contentEl = document.getElementById(`content-${id}`);
      const card = document.getElementById(`card-${id}`);
      const editBtn = document.getElementById(`edit-btn-${id}`);

      titleEl.setAttribute('readonly', true);
      contentEl.setAttribute('readonly', true);
      titleEl.style.pointerEvents = 'none';
      contentEl.style.pointerEvents = 'none';
      card.classList.remove('editing');
      editBtn.textContent = 'Edit';
      editBtn.classList.remove('save');
    } catch {}
  }

  async function deleteNote(id) {
    try {
      const res = await fetch(`${API}/notes/${id}`, {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${token}` }
      });
      if (res.ok) loadNotes();
    } catch {}
  }

  async function createNote() {
    const title = document.getElementById('new-title').value.trim();
    const content = document.getElementById('new-content').value.trim();
    if (!title || !content) return;

    const btn = document.getElementById('add-btn');
    btn.disabled = true;
    btn.textContent = 'Adding...';

    try {
      const res = await fetch(`${API}/notes`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, content })
      });
      if (res.ok) {
        document.getElementById('new-title').value = '';
        document.getElementById('new-content').value = '';
        loadNotes();
      }
    } catch {}

    btn.disabled = false;
    btn.textContent = 'Add note';
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Enter to submit on login
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('auth-screen').style.display !== 'none') {
      const loginVisible = document.getElementById('login-form').style.display !== 'none';
      loginVisible ? login() : signup();
    }
  });
</script>
</body>
</html>
